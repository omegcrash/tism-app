<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="theme-color">
    <!--
      This viewport works for phones with notches.
      It's optimized for gestures by disabling global zoom.
     -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, minimum-scale=1, maximum-scale=1, viewport-fit=cover"
    />
    <!--
      Preconnect to essential domains
    -->
    <link rel="preconnect" href="https://tism.social">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <title>%WEB_TITLE%</title>

    <!-- TISM: Lexend font for dyslexia-friendly reading -->
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="preload" as="font" type="font/woff2" href="/static/media/InterVariable.c504db5c06caaf7cdfba.woff2" crossorigin>
    <link rel="stylesheet" href="/static/style.css">

    <style>
      /**
       * Minimum styles required to render splash.
       *
       * ALL OTHER STYLES BELONG IN `src/style.css`
       *
       * THIS NEEDS TO BE DUPLICATED IN `bskyweb/templates/base.html`
       */
      @font-face {
        font-family: 'InterVariable';
        src: url(/static/media/InterVariable.c504db5c06caaf7cdfba.woff2) format('woff2');
        font-weight: 300 1000;
        font-style: normal;
        font-display: swap;
      }
      @font-face {
        font-family: 'InterVariableItalic';
        src: url(/static/media/InterVariable-Italic.01dcbad1bac635f9c9cd.woff2) format('woff2');
        font-weight: 300 1000;
        font-style: italic;
        font-display: swap;
      }
      html,
      body {
        margin: 0px;
        padding: 0px;
        font-family: InterVariable, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Liberation Sans', Helvetica, Arial, sans-serif;
        text-rendering: optimizeLegibility;
        /* Platform-specific reset */
        -webkit-overflow-scrolling: touch;
        -webkit-text-size-adjust: 100%;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        -ms-overflow-style: scrollbar;
        font-synthesis-weight: none;
      }
      /* TISM: Warm earth tones */
      :root {
        --text: #1A1512;
        --background: #FFFAF5;
        --backgroundLight: #EDE5DC;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          color-scheme: dark;
          --text: #FFFAF5;
          --background: #1A1512;
          --backgroundLight: #2A2520;
        }
      }
      html,
      body,
      #root {
        display: flex;
        flex: 1 0 auto;
        min-height: 100%;
        width: 100%;
      }
      /* TISM theme variants */
      html.theme--light,
      html.theme--light body,
      html.theme--light #root {
        background-color: #FFFAF5;
        --text: #1A1512;
        --background: #FFFAF5;
        --backgroundLight: #DDD3C8;
      }
      html.theme--dark,
      html.theme--dark body,
      html.theme--dark #root {
        color-scheme: dark;
        background-color: #1A1512;
        --text: #FFFAF5;
        --background: #1A1512;
        --backgroundLight: #2A2520;
      }
      html.theme--dim,
      html.theme--dim body,
      html.theme--dim #root {
        color-scheme: dark;
        background-color: #151210;
        --text: #FFFAF5;
        --background: #151210;
        --backgroundLight: #2C2721;
      }
      #splash {
        display: flex;
        position: fixed;
        top: 0;
        bottom: 0;
        left: 0;
        right: 0;
        align-items: center;
        justify-content: center;
      }
      #splash svg {
        position: relative;
        top: -50px;
        width: 100px;
      }
      /**
       * We need these styles to prevent shifting due to scrollbar show/hide on
       * OSs that have them enabled by default. This also handles cases where the
       * screen wouldn't otherwise scroll, and therefore hide the scrollbar and
       * shift the content, by forcing the page to show a scrollbar.
       */
      body {
        width: 100%;
        overflow-y: scroll;
      }
    </style>
    <script>
      const theme = localStorage.getItem('ALF_THEME')
      if (theme) {
        document.documentElement.classList.add(`theme--${theme}`)
      }
    </script>
  </head>

  <body>
    <!--
      A generic no script element with a reload button and a message.
      Feel free to customize this however you'd like.
    -->
    <noscript>
      <form
        action=""
        style="
          background-color: #fff;
          position: fixed;
          top: 0;
          left: 0;
          right: 0;
          bottom: 0;
          z-index: 9999;
        "
      >
        <div
          style="
            font-size: 18px;
            font-family: Helvetica, sans-serif;
            line-height: 24px;
            margin: 10%;
            width: 80%;
          "
        >
          <p lang="en">Oh no! It looks like JavaScript is not enabled in your browser.</p>
          <p lang="en" style="margin: 20px 0;">
            <button
              type="submit"
              style="
                background-color: #4630eb;
                border-radius: 100px;
                border: none;
                box-shadow: none;
                color: #fff;
                cursor: pointer;
                font-weight: bold;
                line-height: 20px;
                padding: 6px 16px;
              "
            >
              Reload
            </button>
          </p>
        </div>
      </form>
    </noscript>

    <!-- The root element for your Expo app. -->
    <div id="splash">
      <!-- TISM Turtle SVG -->
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
        <ellipse cx="32" cy="34" rx="18" ry="16" fill="#14A894"/>
        <ellipse cx="32" cy="34" rx="12" ry="10" fill="none" stroke="#14A894" stroke-width="1.5" stroke-opacity="0.4"/>
        <circle cx="32" cy="34" r="5" fill="none" stroke="#14A894" stroke-width="1.5" stroke-opacity="0.4"/>
        <ellipse cx="32" cy="14" rx="6" ry="7" fill="#14A894"/>
        <ellipse cx="16" cy="26" rx="5" ry="4" fill="#14A894" transform="rotate(-30 16 26)"/>
        <ellipse cx="48" cy="26" rx="5" ry="4" fill="#14A894" transform="rotate(30 48 26)"/>
        <ellipse cx="16" cy="44" rx="5" ry="4" fill="#14A894" transform="rotate(30 16 44)"/>
        <ellipse cx="48" cy="44" rx="5" ry="4" fill="#14A894" transform="rotate(-30 48 44)"/>
        <ellipse cx="32" cy="54" rx="3" ry="5" fill="#14A894"/>
      </svg>
    </div>
    <div id="root">
    </div>
  </body>
</html>
